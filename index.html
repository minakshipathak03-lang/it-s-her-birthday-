<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container">
        <div id="envelope" class="envelope-area">
            <div class="envelope-icon">💌</div>
            <h2 class="prompt-text">Click to open, sis!</h2>
        </div>

        <div id="birthday-card" class="card hidden">
            <div class="floating-doodle">🎂</div>
            <h1>Happy Birthday!</h1>
            <p class="message">To the most amazing sister in the world.</p>
            <div class="icons">✨ 🎈 🍰 🦄 ✨</div>
            <p class="footer">Hope your day is as magical as you are!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
